<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .planet-fact {
            color: blue;
            margin-top: 10px;
            font-size: 20px;
        }

        .planet-name {
            font-size: 24px;
            font-weight: bold;
            color: black;
        }

        .card {
            background: white;
            border: 3px solid orange;
            padding: 20px;
            width: 200px;
        }
    </style>
</head>

<body>
    <H1>My Planet Cards</H1>
    <p>use javascript class to build hero cards</p>
    <button onclick="showhero()">show hero</button>
    <div class="cards">
        <div id="card1"></div>
        <div id="card2"></div>
        <div id="card3"></div>
    </div>
    <script>
        class hero {
            constructor(name, fact) {
                this.name = name
                this.fact = fact
            }
            discribe() {
                return this.name + ": " + this.fact
            }
        }
        function showhero() {
            let p1 = new planet("spider man", "Spider-Man is the alter ego of Peter Parker, a scientifically gifted teenager from New York who gains superhuman spider-like abilities after being bitten by a radioactive spider, dedicating his life to fighting crime while balancing the everyday struggles of ordinary life.")
            let p2 = new planet("flash", "The Flash is the fastes man alive")
            let p3 = new planet("deadpool", "Deadpool is a scarred, wisecracking mercenary with superhuman regenerative powers who is hyper-aware that he is a comic book character, allowing him to constantly break the fourth wall for chaotic, violent, and hilarious results.")
            document.getElementById("card1").innerHTML = "<div class='card'><div class='planet-name'>" + p1.name + "</div>" + "<div class='planet-fact'>" + p1.discribe() + "</div></div>"

            document.getElementById("card2").innerHTML = "<div class='card'><div class='planet-name'>" + p2.name + "</div>" + "<div class='planet-fact'>" + p2.discribe() + "</div></div>"

            document.getElementById("card3").innerHTML = "<div class='card'><div class='planet-name'>" + p3.name + "</div>" + "<div class='planet-fact'>" + p3.discribe() + "</div></div>"
        }
    </script>
</body>

</html>
